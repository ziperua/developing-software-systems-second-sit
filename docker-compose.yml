services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: moviewatchlist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "4058:4058"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/moviewatchlist
      JWT_SECRET: super-secret-key-minimum-32-characters-long!
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 120
    depends_on:
      db:
        condition: service_healthy